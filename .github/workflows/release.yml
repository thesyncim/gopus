name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write
  checks: read

env:
  LIBOPUS_VERSION: "1.6.1"
  GOPUS_DISABLE_OPUSDEC: "0"
  GOPUS_DISABLE_OPUSENC: "1"

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve tag and release notes
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
            git fetch --force --tags origin "refs/tags/${tag}:refs/tags/${tag}"
            git checkout "refs/tags/${tag}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          notes_path="README.md"
          if [[ ! -s "${notes_path}" ]]; then
            echo "missing release notes: ${notes_path}" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "notes_path=${notes_path}" >> "$GITHUB_OUTPUT"

      - name: Require green CI on the tagged commit
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          sha="$(git rev-parse HEAD)"
          echo "Verifying required CI checks are green on ${sha}"

          # The required branch checks are aggregate gates: test-linux fans out to
          # every codec sub-lane (parity, core-oracles, build-config-matrix,
          # fixedpoint), and test-macos/test-windows run the exhaustive tier. They
          # are the authoritative, arch-matched codec gate, so a release publishes
          # only when they are green on the exact commit the tag points at.
          latest="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}/check-runs?per_page=100" \
            --jq '[.check_runs[] | {name, conclusion, started_at}] | group_by(.name) | map(max_by(.started_at)) | .[] | [.name, .conclusion] | @tsv')"
          printf '%s\n' "${latest}"

          fail=0
          for name in lint-static-analysis test-linux perf-linux test-macos test-windows; do
            concl="$(awk -F'\t' -v n="${name}" '$1==n{print $2}' <<<"${latest}")"
            if [[ "${concl}" != "success" ]]; then
              echo "::error::required check '${name}' is '${concl:-missing}' on ${sha}"
              fail=1
            fi
          done

          if [[ "${fail}" -ne 0 ]]; then
            echo "::error::tagged commit ${sha} is not green on the required CI checks; refusing to publish"
            exit 1
          fi
          echo "all required checks are green"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache pinned libopus build
        uses: actions/cache@v5
        with:
          path: |
            tmp_check/opus-${{ env.LIBOPUS_VERSION }}
            tmp_check/opus-${{ env.LIBOPUS_VERSION }}.tar.gz
          key: release-libopus-${{ runner.os }}-${{ runner.arch }}-${{ env.LIBOPUS_VERSION }}-${{ hashFiles('tools/ensure_libopus.sh') }}

      - name: Install codec tools (if missing)
        run: |
          if command -v ffmpeg >/dev/null 2>&1 && command -v opusdec >/dev/null 2>&1; then
            echo "ffmpeg and opusdec already present; skipping apt install"
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg opus-tools

      - name: Run full release verification and evidence capture
        run: make release-evidence

      - name: Upload evidence bundle on failure (diagnosis)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-failed-${{ steps.meta.outputs.tag }}
          path: reports/release/
          if-no-files-found: warn

      - name: Archive release evidence
        id: evidence
        shell: bash
        run: |
          set -euo pipefail
          summary="$(find reports/release -maxdepth 1 -type f -name 'release-evidence-*.md' | sort | tail -n 1)"
          if [[ -z "${summary}" || ! -s "${summary}" ]]; then
            echo "release evidence summary is missing" >&2
            exit 1
          fi
          if ! grep -q 'Overall result: PASS' "${summary}"; then
            echo "release evidence summary did not record a passing run: ${summary}" >&2
            exit 1
          fi

          archive="release-evidence-${{ steps.meta.outputs.tag }}.tar.gz"
          tagged_summary="release-evidence-${{ steps.meta.outputs.tag }}.md"
          cp "${summary}" "${tagged_summary}"
          tar -C reports -czf "${archive}" release
          test -s "${archive}" || { echo "release evidence archive is empty" >&2; exit 1; }
          test -s "${tagged_summary}" || { echo "tagged release evidence summary is empty" >&2; exit 1; }

          echo "archive=${archive}" >> "$GITHUB_OUTPUT"
          echo "summary=${tagged_summary}" >> "$GITHUB_OUTPUT"

      - name: Upload release evidence artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-evidence-${{ steps.meta.outputs.tag }}
          path: |
            ${{ steps.evidence.outputs.archive }}
            ${{ steps.evidence.outputs.summary }}
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.meta.outputs.tag }}"
          notes_path="${{ steps.meta.outputs.notes_path }}"
          archive="${{ steps.evidence.outputs.archive }}"
          summary="${{ steps.evidence.outputs.summary }}"

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "gopus ${tag}" \
              --notes-file "${notes_path}"
            gh release upload "${tag}" "${archive}" "${summary}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${tag}" "${archive}" "${summary}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "gopus ${tag}" \
              --notes-file "${notes_path}" \
              --verify-tag
          fi
